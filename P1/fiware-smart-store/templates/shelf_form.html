{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>{{ _('Editar Balda') if shelf else _('Nueva Balda') }}</h2>

    <form method="POST">
        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="name" style="display: block; margin-bottom: 0.5rem; color: var(--text-color);">{{ _('Nombre de
                la balda') }}</label>
            <input type="text" id="name" name="name" required
                style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; background-color: var(--bg-color); color: var(--text-color);"
                value="{{ shelf.name if shelf else '' }}">
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="location" style="display: block; margin-bottom: 0.5rem; color: var(--text-color);">{{
                _('Ubicación / Detalles') }}</label>
            <input type="text" id="location" name="location"
                style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; background-color: var(--bg-color); color: var(--text-color);"
                value="{{ shelf.location if shelf else '' }}">
        </div>

        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary"
                style="background-color: var(--primary-color); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;">
                {{ _('Guardar') }}
            </button>
            <a href="{{ url_for('store_detail', id=store_id) if store_id else (url_for('store_detail', id=shelf.refStore) if shelf else '#') }}"
                class="btn"
                style="text-decoration: none; padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-color);">
                {{ _('Cancelar') }}
            </a>
        </div>
    </form>
</div>
{% endblock %}
