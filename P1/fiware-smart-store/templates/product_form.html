{% extends "base.html" %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{{ url_for('view_products') }}" style="color: var(--primary-color); text-decoration: none;">
        <i class="fa-solid fa-arrow-left"></i> {{ _('Volver al catálogo') }}
    </a>
</div>

<div class="form-container">
    <h2 style="margin-bottom: 1rem;"><i class="fa-solid fa-plus"></i> {{ _('Nuevo Producto') }}</h2>
    <form method="POST">
        <div class="form-group">
            <label for="name">{{ _('Nombre del Producto') }}</label>
            <input type="text" id="name" name="name" class="form-control" required
                placeholder="{{ _('Ej: Leche Entera') }}">
        </div>
        <div class="form-group">
            <label for="size">{{ _('Tamaño / Descripción') }}</label>
            <input type="text" id="size" name="size" class="form-control" placeholder="{{ _('Ej: 1 Litro') }}">
        </div>
        <div class="form-group">
            <label for="price">{{ _('Precio (€)') }}</label>
            <input type="number" step="0.01" id="price" name="price" class="form-control" required
                placeholder="Ej: 0.90">
        </div>
        <div class="form-group">
            <label for="originCountry">{{ _('País de Origen') }}</label>
            <input type="text" id="originCountry" name="originCountry" class="form-control"
                placeholder="{{ _('Ej: España') }}">
        </div>
        <div class="form-group">
            <label for="image">{{ _('URL de la Imagen') }}</label>
            <input type="url" id="image" name="image" class="form-control" placeholder="{{ _('Ej: https://...') }}">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="fa-solid fa-floppy-disk"></i> {{ _('Guardar Producto') }}
        </button>
    </form>
</div>
{% endblock %}
