{% extends "base.html" %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{{ url_for('view_stores') }}" style="color: var(--primary-color); text-decoration: none;">
        <i class="fa-solid fa-arrow-left"></i> {{ _('Volver a tiendas') }}
    </a>
</div>

<div class="form-container">
    <h2 style="margin-bottom: 1rem;"><i class="fa-solid fa-plus"></i> {{ _('Nueva Tienda') }}</h2>
    <form method="POST">
        <div class="form-group">
            <label for="name">{{ _('Nombre de la Tienda') }}</label>
            <input type="text" id="name" name="name" class="form-control" required
                placeholder="{{ _('Ej: Supermercado Norte') }}">
        </div>
        <div class="form-group">
            <label for="address">{{ _('Ubicación') }}</label>
            <input type="text" id="address" name="address" class="form-control" required
                placeholder="{{ _('Ej: Calle Mayor, 1') }}">
        </div>
        <div class="form-group">
            <label for="image">{{ _('URL de la Imagen (opcional)') }}</label>
            <input type="url" id="image" name="image" class="form-control" placeholder="{{ _('Ej: https://...') }}">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="fa-solid fa-floppy-disk"></i> {{ _('Guardar Tienda') }}
        </button>
    </form>
</div>
{% endblock %}
